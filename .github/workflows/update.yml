name: Update GradCafe Data

on:
  schedule:
    - cron: '0 7 * * 0'  # Sundays 07:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: sudo apt-get update -qq && sudo apt-get install -y xvfb chromium-browser
      - run: pip install -r requirements.txt
      - name: Run update (admission season Jan–Apr only)
        run: |
          MONTH=$(date +%-m)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || ([ "$MONTH" -ge 1 ] && [ "$MONTH" -le 4 ]); then
            xvfb-run --auto-servernum python build.py --recent
          else
            echo "Outside admission season, skipping."
          fi
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gradcafe_polisci.csv data/last_updated.txt docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: $(date -u +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
