name: Update GradCafe Data

on:
  schedule:
    # Every Sunday 07:00 UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check season (Jan–Apr only for scheduled runs)
        id: check_month
        run: |
          MONTH=$(date +%-m)
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || ([ "$MONTH" -ge 1 ] && [ "$MONTH" -le 4 ]); then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check_month.outputs.run == 'true'

      - name: Set up Python
        if: steps.check_month.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        if: steps.check_month.outputs.run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb chromium-browser

      - name: Install Python dependencies
        if: steps.check_month.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run recent update (with virtual display)
        if: steps.check_month.outputs.run == 'true'
        run: xvfb-run --auto-servernum python build.py --recent

      - name: Commit and push if changed
        if: steps.check_month.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gradcafe_polisci.csv data/last_updated.txt docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: $(date -u +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
